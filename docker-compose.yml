services:
  postgres:
    image: postgres:16-alpine
    container_name: techatlas-postgres
    environment:
      POSTGRES_DB: techatlas
      POSTGRES_USER: techatlas
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data:
